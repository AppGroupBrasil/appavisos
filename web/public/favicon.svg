<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="55%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#020617"/>
    </radialGradient>
    <linearGradient id="bell" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="55%" stop-color="#F1F5F9"/>
      <stop offset="100%" stop-color="#CBD5E1"/>
    </linearGradient>
    <linearGradient id="bellShine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.85"/>
      <stop offset="60%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="45%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#B45309"/>
    </linearGradient>
    <linearGradient id="boltShine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="dot" cx="35%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#FCA5A5"/>
      <stop offset="40%" stop-color="#EF4444"/>
      <stop offset="100%" stop-color="#7F1D1D"/>
    </radialGradient>
    <filter id="bellShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="8"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="boltShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.55"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>
  <rect x="6" y="6" width="500" height="500" rx="108" ry="108" fill="none" stroke="#FFFFFF" stroke-opacity="0.07" stroke-width="2"/>

  <ellipse cx="256" cy="280" rx="160" ry="120" fill="#F59E0B" fill-opacity="0.18" filter="url(#glow)"/>

  <g filter="url(#bellShadow)">
    <rect x="246" y="100" width="20" height="22" rx="6" fill="url(#bell)"/>
    <path d="M 256 118 C 184 118, 156 168, 156 240 C 156 296, 144 330, 124 354 L 388 354 C 368 330, 356 296, 356 240 C 356 168, 328 118, 256 118 Z" fill="url(#bell)"/>
    <path d="M 256 118 C 200 118, 174 158, 168 210 C 174 178, 200 142, 244 138 C 248 128, 252 122, 256 118 Z" fill="url(#bellShine)"/>
    <ellipse cx="256" cy="380" rx="26" ry="28" fill="url(#bell)"/>
  </g>

  <g filter="url(#boltShadow)">
    <path d="M 286 168 L 222 270 L 268 270 L 244 360 L 320 240 L 268 240 L 296 168 Z" fill="url(#bolt)"/>
    <path d="M 286 168 L 222 270 L 252 270 L 248 280 L 286 220 Z" fill="url(#boltShine)"/>
  </g>

  <circle cx="350" cy="156" r="32" fill="url(#dot)"/>
  <circle cx="342" cy="148" r="10" fill="#FFFFFF" fill-opacity="0.5"/>
</svg>
